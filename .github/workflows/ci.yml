name: CI

on:
  pull_request:
    branches:
      - main
      - staging
  push:
    branches:
      - main
      - staging
      - feat/*

jobs:
  quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: SetupNode.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -r lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Unit Test
        run: pnpm -r test

      - name: Build
        run: pnpm -r build
